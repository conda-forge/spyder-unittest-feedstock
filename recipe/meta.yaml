{% set name = "spyder-unittest" %}
{% set version = "0.7.1" %}
{% set hash = "a50f559028803001ae63b76e90151e9a567806c8ffef1ca24dec3179a450bd7d" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: {{ hash }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - lxml
    - python >={{ python_min }}
    - spyder >=6,<7
    - pyzmq

test:
  requires:
    - python {{ python_min }}
  imports:
    - spyder_unittest

about:
  home: https://github.com/spyder-ide/spyder-unittest
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Spyder plugin that integrates popular unit test frameworks.
  description: |
    It allows you to run tests and view the results.
  dev_url: https://github.com/spyder-ide/spyder-unittest

extra:
  recipe-maintainers:
    - ccordoba12
    - jitseniesen
